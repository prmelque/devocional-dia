<!DOCTYPE html>
<html lang="pt‑BR">
<head>
  <meta charset="UTF‑8">
  <meta name="viewport" content="width=device‑width, initial‑scale=1.0">
  <title>Devocional do Dia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border‑box;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: Arial, sans‑serif;
      /* Usa 96 % da largura — quase sem bordas laterais */
      max-width: min(96vw, 800px);
      margin: 0 auto;
      /* Espaço pequeno nas bordas para não encostar na tela */
      padding: clamp(1rem, 3vw, 2.5rem);
      line-height: 1.85;
      /* Texto principal: MAIOR AINDA */
      font-size: clamp(1.25rem, 3.8vw, 1.8rem);
    }
    h1 {
      text-transform: uppercase;
      /* Título bem destacado */
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      margin-bottom: clamp(1rem, 2.5vw, 2rem);
      color: #fcd34d;
      text-align: center;
    }
    .versiculo {
      font-style: italic;
      margin: clamp(1rem, 2.5vw, 2rem) 0;
      color: #cccccc;
      /* Versículo maior que o texto comum */
      font-size: clamp(1.3rem, 4vw, 1.9rem);
    }
    .reflexao {
      margin: clamp(1rem, 2.5vw, 2rem) 0;
    }
    .oracao {
      margin-top: clamp(2rem, 5vw, 3.5rem);
      padding-top: clamp(1rem, 2.5vw, 1.5rem);
      border-top: 1px solid #444444;
      /* Oração também grande e clara */
      font-size: clamp(1.3rem, 4vw, 1.9rem);
    }
  </style>
</head>
<body>
  <div id="devocional"></div>

  <script src="dados.js"></script>
  <script>
    const hoje = new Date();
    const diaDoAno = Math.ceil(
      (hoje - new Date(hoje.getFullYear(), 0, 1)) / (1000 * 60 * 60 * 24)
    );
    const indice = (diaDoAno - 1) % devocionais.length;
    const d = devocionais[indice];

    document.getElementById('devocional').innerHTML = `
      <h1>${d.titulo}</h1>
      <div class="versiculo">${d.versiculo}</div>
      <div class="reflexao">${d.reflexao}</div>
      <div class="oracao"><strong>ORAÇÃO:</strong><br>${d.oracao}</div>
    `;
  </script>
</body>
</html>
