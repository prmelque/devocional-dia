<!DOCTYPE html>
<html lang="pt‑BR">
<head>
  <meta charset="UTF‑8">
  <meta name="viewport" content="width=device‑width, initial‑scale=1.0">
  <title>Devocional do Dia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border‑box; }
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans‑serif;
      max-width: min(96vw, 800px);
      margin: 0 auto;
      padding: clamp(1rem, 3vw, 2.5rem);
      line-height: 1.85;
      font-size: clamp(1.25rem, 3.8vw, 1.8rem);
    }
    h1 {
      text-transform: uppercase;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      margin-bottom: clamp(1rem, 2.5vw, 2rem);
      color: #fcd34d;
      text-align: center;
    }
    .versiculo {
      font-style: italic;
      margin: clamp(1rem, 2.5vw, 2rem) 0;
      color: #ccc;
      font-size: clamp(1.3rem, 4vw, 1.9rem);
    }
    .reflexao { margin: clamp(1rem, 2.5vw, 2rem) 0; }
    .oracao {
      margin-top: clamp(2rem, 5vw, 3.5rem);
      padding-top: clamp(1rem, 2.5vw, 1.5rem);
      border-top: 1px solid #444;
      font-size: clamp(1.3rem, 4vw, 1.9rem);
    }
    /* RODAPÉ: 50% do tamanho anterior + alinhado à DIREITA */
    .rodape {
      margin-top: 4rem;
      padding-top: 1.2rem;
      border-top: 1px solid #2f2f2f;
      text-align: right;           /* alinhamento à direita */
      font-size: clamp(0.5rem, 1.2vw, 0.7rem); /* metade da medida anterior */
      color: #999;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div id="devocional"></div>

  <div class="rodape">Pr. Melque Meireles</div>

  <script src="dados.js"></script>
  <script>
    const hoje = new Date();
    const diaDoAno = Math.ceil(
      (hoje - new Date(hoje.getFullYear(), 0, 1)) / (1000 * 60 * 60 * 24)
    );
    const indice = (diaDoAno - 1) % devocionais.length;
    const d = devocionais[indice];

    document.getElementById('devocional').innerHTML = `
      <h1>${d.titulo}</h1>
      <div class="versiculo">${d.versiculo}</div>
      <div class="reflexao">${d.reflexao}</div>
      <div class="oracao"><strong>ORAÇÃO:</strong><br>${d.oracao}</div>
    `;
  </script>
</body>
</html>
