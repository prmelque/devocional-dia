<!DOCTYPE html>
<html lang="pt‑BR">
<head>
  <meta charset="UTF‑8">
  <meta name="viewport" content="width=device‑width, initial‑scale=1.0">
  <title>Devocional do Dia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border‑box;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: Arial, sans‑serif;
      max-width: min(92vw, 750px);
      margin: 0 auto;
      padding: clamp(1.3rem, 4.5vw, 3.2rem);
      line-height: 1.8;
      /* Texto principal: MAIOR — mínimo 1.1rem, ideal 3vw, máximo 1.5rem */
      font-size: clamp(1.1rem, 3vw, 1.5rem);
    }
    h1 {
      text-transform: uppercase;
      /* Título: bem maior que o texto */
      font-size: clamp(1.3rem, 4vw, 2rem);
      margin-bottom: clamp(1rem, 2.2vw, 1.8rem);
      color: #fcd34d;
      text-align: center;
    }
    .versiculo {
      font-style: italic;
      margin: clamp(1rem, 2.2vw, 1.8rem) 0;
      color: #cccccc;
      /* Versículo um pouco maior que o corpo */
      font-size: clamp(1.15rem, 3.1vw, 1.6rem);
    }
    .reflexao {
      margin: clamp(1rem, 2.2vw, 1.8rem) 0;
    }
    .oracao {
      margin-top: clamp(1.8rem, 4.5vw, 3rem);
      padding-top: clamp(1rem, 2.2vw, 1.2rem);
      border-top: 1px solid #333333;
      /* Oração também destacada */
      font-size: clamp(1.15rem, 3.1vw, 1.6rem);
    }
  </style>
</head>
<body>
  <div id="devocional"></div>

  <script src="dados.js"></script>
  <script>
    const hoje = new Date();
    const diaDoAno = Math.ceil(
      (hoje - new Date(hoje.getFullYear(), 0, 1)) / (1000 * 60 * 60 * 24)
    );
    const indice = (diaDoAno - 1) % devocionais.length;
    const d = devocionais[indice];

    document.getElementById('devocional').innerHTML = `
      <h1>${d.titulo}</h1>
      <div class="versiculo">${d.versiculo}</div>
      <div class="reflexao">${d.reflexao}</div>
      <div class="oracao"><strong>ORAÇÃO:</strong><br>${d.oracao}</div>
    `;
  </script>
</body>
</html>
